server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: api-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

gateway:
  plugins:
    directory: plugins
  auth:
    enabled: true
    exclude-paths:
      - /actuator/**
    jwt:
      enabled: true
      issuer: https://auth.example.com
      audience: api-gateway
      jwks-uri: http://localhost:8082/.well-known/jwks.json
      jwks-refresh-interval-seconds: 300
      clock-skew-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
